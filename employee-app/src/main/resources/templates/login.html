<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head>
    <title>Login</title>
</head>
<body>
<section>
    <div class="card auth-card">
        <h1 data-testid="login-title">Employee Management Login</h1>
        <p class="subtitle">Sign in to manage employees</p>

        <div th:if="${param.error}" class="alert alert-error" data-testid="login-error">
            Invalid username or password.
        </div>
        <div th:if="${param.logout}" class="alert alert-success" data-testid="logout-message">
            You have been logged out.
        </div>

        <form th:action="@{/login}" method="post" data-testid="login-form">
            <label for="username">Username</label>
            <input id="username" name="username" type="text" required data-testid="username-input"/>

            <label for="password">Password</label>
            <input id="password" name="password" type="password" required data-testid="password-input"/>

            <button type="submit" data-testid="login-button">Login</button>
        </form>
    </div>
</section>
</body>
</html>
