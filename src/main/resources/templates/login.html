<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Employee Management</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="login-page">
<div class="login-card" id="login-page">
    <h1 id="login-title">Employee Management</h1>
    <p class="subtitle">Sign in to continue</p>

    <div th:if="${param.error}" class="alert alert-error" id="login-error">
        Invalid username or password.
    </div>
    <div th:if="${param.logout}" class="alert alert-success" id="logout-message">
        You have been logged out.
    </div>

    <form th:action="@{/login}" method="post" id="login-form">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required autofocus>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" id="login-button" class="btn btn-primary">Login</button>
    </form>
</div>
</body>
</html>
