services:
  employee-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: employee-app:latest
    ports:
      - "8080:8080"
    volumes:
      - employee-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/login || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

volumes:
  employee-data:
